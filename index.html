<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>See</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d12;
      --surface:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --text:#f0eee8;
      --text-dim:rgba(240,238,232,.55);
      --serif:'Cormorant Garamond',Georgia,serif;
      --sans:'Inter',system-ui,sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}

    #rippleCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}

    .screen{position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .55s ease;z-index:10}
    .screen.active{opacity:1;pointer-events:all}

    /* ── SPLASH ── */
    #s-splash{justify-content:flex-end;padding:0}
    .splash-img{position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;object-position:center top}
    .splash-btn{position:relative;z-index:10;
      font-family:var(--sans);font-size:clamp(12px,3vw,15px);
      font-weight:400;letter-spacing:.22em;text-transform:uppercase;
      color:rgba(240,238,232,.92);background:rgba(13,13,18,.90);
      border:1.5px solid rgba(255,255,255,.28);border-radius:6px;
      padding:20px 0;width:calc(100% - 48px);
      margin-bottom:clamp(32px,8vw,52px);
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      transition:border-color .3s,box-shadow .3s}
    .splash-btn:hover{border-color:rgba(255,255,255,.55);
      box-shadow:0 0 28px rgba(255,255,255,.08)}

    /* ── CHROME ── */
    #chrome{position:fixed;top:0;left:0;right:0;display:none;
      align-items:center;padding:max(env(safe-area-inset-top),18px) 20px 12px;z-index:100}
    .back-btn{background:none;border:none;cursor:pointer;
      color:rgba(240,238,232,.55);font-size:24px;padding:8px;
      -webkit-tap-highlight-color:transparent;transition:color .2s}
    .back-btn:hover{color:var(--text)}
    .gear-btn{margin-left:auto;background:none;border:none;cursor:pointer;
      color:rgba(240,238,232,.35);font-size:18px;padding:8px;
      -webkit-tap-highlight-color:transparent}

    /* ── HOME ── */
    #s-home{padding:0;justify-content:stretch}
    .home-inner{display:flex;flex-direction:column;align-items:center;
      width:100%;height:100%;padding:max(env(safe-area-inset-top),52px) 0 max(env(safe-area-inset-bottom),32px)}
    .wordmark{font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(96px,26vw,140px);color:var(--text);
      letter-spacing:.06em;line-height:1;
      text-shadow:0 0 60px rgba(255,255,255,.12);
      margin-bottom:clamp(24px,6vw,36px);margin-top:auto}
    .mode-grid{display:flex;flex-direction:column;width:100%;
      border-top:1px solid var(--border);margin-top:auto}
    .mode-card{display:flex;align-items:center;justify-content:space-between;
      padding:clamp(20px,5vw,28px) 28px;
      border-bottom:1px solid var(--border);
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      transition:background .2s}
    .mode-card:active{background:rgba(255,255,255,.04)}
    .mc-left{display:flex;flex-direction:column;gap:4px}
    .mc-title{font-size:clamp(26px,6.5vw,34px);font-weight:300;
      letter-spacing:-.01em;color:var(--text)}
    .mc-sub{font-size:clamp(12px,3vw,14px);color:var(--text-dim);
      letter-spacing:.06em}
    .mc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

    /* ── NOTING ── */
    #s-noting{padding:72px 24px 48px;justify-content:flex-start;gap:0}
    .step-lbl{font-size:clamp(11px,2.6vw,13px);letter-spacing:.20em;
      text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
    .step-title{font-family:var(--serif);font-style:italic;
      font-size:clamp(32px,8vw,44px);font-weight:300;
      color:var(--text);margin-bottom:clamp(24px,6vw,32px);text-align:center}
    .chip-grid{display:flex;flex-wrap:wrap;gap:10px;
      justify-content:center;width:100%;max-width:360px}
    .chip{font-family:var(--sans);font-size:clamp(15px,3.8vw,19px);
      font-weight:400;color:#0d0d12;
      border:none;border-radius:999px;padding:11px 22px;
      cursor:pointer;transition:transform .15s,opacity .15s;
      -webkit-tap-highlight-color:transparent;letter-spacing:.01em}
    .chip:active{transform:scale(.95);opacity:.85}

    /* Mic */
    .mic-row{display:flex;align-items:center;gap:12px;margin-top:24px}
    .mic-btn{width:46px;height:46px;border-radius:50%;
      background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);
      color:rgba(240,238,232,.5);cursor:pointer;display:flex;
      align-items:center;justify-content:center;position:relative;
      -webkit-tap-highlight-color:transparent;transition:all .3s}
    .mic-btn.on{background:rgba(232,69,106,.18);border-color:rgba(232,69,106,.6);
      color:rgba(232,69,106,.9)}
    .mic-btn.hidden{display:none}
    .mic-pulse{position:absolute;inset:-5px;border-radius:50%;
      border:2px solid rgba(232,69,106,.5);opacity:0;pointer-events:none}
    .mic-btn.on .mic-pulse{animation:mP 1.2s ease-out infinite}
    @keyframes mP{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.7);opacity:0}}
    .mic-hint{font-size:clamp(12px,3vw,14px);color:var(--text-dim);letter-spacing:.05em}

    .ai-w{font-size:clamp(13px,3.2vw,16px);letter-spacing:.08em;
      color:rgba(138,191,184,.9);text-align:center;margin-top:20px;
      min-height:24px;opacity:0;transition:opacity 1.2s ease}
    .ai-w.show{opacity:1}

    /* ── ANCHOR ── */
    #s-anchor{gap:0}
    .a-instr{font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(20px,5vw,26px);color:var(--text-dim);
      text-align:center;line-height:1.75;max-width:300px;
      transition:opacity 2s ease;margin-bottom:40px}
    .a-instr.fade{opacity:0;pointer-events:none}
    /* Breath orb — simple, centred, luminous */
    .b-orb{
      width:clamp(160px,42vw,200px);height:clamp(160px,42vw,200px);
      border-radius:50%;
      background:radial-gradient(circle at 50% 50%,
        rgba(232,69,106,.35) 0%,
        rgba(232,69,106,.12) 40%,
        rgba(232,69,106,.04) 70%,
        transparent 100%);
      border:1.5px solid rgba(232,69,106,.4);
      display:flex;align-items:center;justify-content:center;
      transition:transform 5s ease-in-out,
                 box-shadow 5s ease-in-out,
                 border-color 5s ease-in-out,
                 background 5s ease-in-out;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      box-shadow:0 0 40px rgba(232,69,106,.15),inset 0 0 30px rgba(232,69,106,.08)}
    .b-orb.inhale{
      transform:scale(1.22);
      border-color:rgba(232,69,106,.75);
      box-shadow:0 0 70px rgba(232,69,106,.28),inset 0 0 40px rgba(232,69,106,.15);
      background:radial-gradient(circle at 50% 50%,
        rgba(232,69,106,.55) 0%,
        rgba(232,69,106,.22) 40%,
        rgba(232,69,106,.08) 70%,
        transparent 100%)}
    .b-lbl{font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(22px,5.5vw,28px);color:rgba(240,238,232,.8);
      letter-spacing:.14em;transition:opacity .5s}
    .w-btn{margin-top:32px;background:none;border:none;
      font-family:var(--sans);font-size:clamp(12px,3vw,14px);
      letter-spacing:.16em;text-transform:lowercase;
      color:rgba(240,238,232,.28);cursor:pointer;
      -webkit-tap-highlight-color:transparent;transition:color .3s}
    .w-btn:hover{color:rgba(240,238,232,.60)}
    .ret-txt{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(48px,13vw,72px);color:var(--text);letter-spacing:.10em;
      opacity:0;pointer-events:none;transition:opacity 1s ease;z-index:50}
    .ret-txt.show{opacity:1}

    /* ── STORM ── */
    #s-storm{}
    .storm-inner{display:flex;flex-direction:column;align-items:center;
      justify-content:center;width:100%;height:100%;
      padding:80px 32px 60px;gap:20px}
    .storm-toggle{display:flex;gap:0;border:1.5px solid var(--border);
      border-radius:999px;overflow:hidden;margin-bottom:8px}
    .storm-toggle-btn{background:none;border:none;
      font-family:var(--sans);font-size:clamp(11px,2.8vw,13px);
      letter-spacing:.14em;text-transform:lowercase;
      color:var(--text-dim);padding:9px 22px;cursor:pointer;
      transition:all .2s;-webkit-tap-highlight-color:transparent}
    .storm-toggle-btn.active{background:rgba(255,255,255,.10);color:var(--text)}
    .storm-word{font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(44px,12vw,68px);color:var(--text);
      letter-spacing:.06em;text-align:center;opacity:0;
      transition:opacity .32s ease;cursor:pointer;
      -webkit-tap-highlight-color:transparent;line-height:1.1}
    .storm-word.show{opacity:1}
    .storm-sub{font-size:clamp(12px,3vw,14px);letter-spacing:.14em;
      color:var(--text-dim);text-transform:lowercase}
    .storm-wit{font-size:clamp(13px,3.2vw,16px);letter-spacing:.08em;
      color:rgba(138,191,184,.9);text-align:center;max-width:80vw;
      opacity:0;transition:opacity 1.5s ease;font-style:italic}
    .storm-wit.show{opacity:1}

    /* ── SETTINGS ── */
    #s-settings{background:rgba(13,13,18,.97);z-index:200;padding:60px 28px;gap:14px}
    .st-title{font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(24px,6vw,32px);color:var(--text);margin-bottom:8px}
    .st-inp{width:100%;max-width:340px;font-family:var(--sans);font-size:14px;
      color:var(--text);background:rgba(255,255,255,.06);
      border:1.5px solid var(--border);border-radius:8px;padding:13px 16px;outline:none}
    .st-inp::placeholder{color:rgba(240,238,232,.28)}
    .st-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .st-btn{font-family:var(--sans);font-size:12px;letter-spacing:.14em;
      text-transform:lowercase;color:var(--text-dim);
      background:rgba(255,255,255,.06);border:1.5px solid var(--border);
      border-radius:999px;padding:10px 24px;cursor:pointer;
      transition:all .25s;-webkit-tap-highlight-color:transparent}
    .st-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28)}
    .st-note{font-size:11px;letter-spacing:.10em;color:rgba(240,238,232,.28)}
    .st-close{position:absolute;top:18px;right:18px;background:none;border:none;
      cursor:pointer;color:var(--text-dim);font-size:26px;
      -webkit-tap-highlight-color:transparent}
    .st-link{font-size:12px;letter-spacing:.10em;color:rgba(138,191,184,.7);
      text-decoration:none}
    .st-link:hover{color:rgba(138,191,184,1)}
  </style>
</head>
<body>
<canvas id="rippleCanvas"></canvas>

<!-- SETTINGS -->
<div class="screen" id="s-settings">
  <button class="st-close" onclick="closeSettings()">×</button>
  <div class="st-title">See · Settings</div>
  <input class="st-inp" id="apiInput" type="password"
    placeholder="Anthropic API key (optional)" autocomplete="off"/>
  <div class="st-btns">
    <button class="st-btn" onclick="saveKey()">save key</button>
    <button class="st-btn" onclick="clearKey()">clear key</button>
  </div>
  <div class="st-note">stored locally · never transmitted</div>
  <a class="st-link" href="https://buymeacoffee.com/coherence_nikolai"
    target="_blank" rel="noopener">support this work</a>
</div>

<!-- SPLASH -->
<div class="screen active" id="s-splash">
  <img class="splash-img" id="splashImg" alt="See"/>
  <button class="splash-btn" onclick="goHome()">begin practice</button>
</div>

<!-- HOME -->
<div class="screen" id="s-home">
  <div class="home-inner">
    <div class="wordmark">See</div>
    <div class="mode-grid">
      <div class="mode-card" onclick="startNoting()">
        <div class="mc-left">
          <div class="mc-title">Noting</div>
          <div class="mc-sub">sense · tone · emotion</div>
        </div>
        <div class="mc-dot" style="background:#F5A623"></div>
      </div>
      <div class="mode-card" onclick="startAnchor()">
        <div class="mc-left">
          <div class="mc-title">Anchor</div>
          <div class="mc-sub">breath · return · presence</div>
        </div>
        <div class="mc-dot" style="background:#E8456A"></div>
      </div>
      <div class="mode-card" onclick="startStorm()">
        <div class="mc-left">
          <div class="mc-title">Storm</div>
          <div class="mc-sub">liberation notes · tap or watch</div>
        </div>
        <div class="mc-dot" style="background:#9B6FE8"></div>
      </div>
    </div>
  </div>
  <div style="position:absolute;top:18px;right:18px;z-index:20">
    <button class="gear-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<!-- CHROME -->
<div id="chrome">
  <button class="back-btn" onclick="goHome()">←</button>
  <button class="gear-btn" onclick="openSettings()">⚙</button>
</div>

<!-- NOTING -->
<div class="screen" id="s-noting">
  <div class="step-lbl" id="stepLbl"></div>
  <div class="step-title" id="stepTitle"></div>
  <div class="chip-grid" id="chipGrid"></div>
  <div class="mic-row">
    <button class="mic-btn hidden" id="micBtn" onclick="toggleVoice()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
      </svg>
      <span class="mic-pulse"></span>
    </button>
    <span class="mic-hint" id="micHint"></span>
  </div>
  <div class="ai-w" id="noteAI"></div>
</div>

<!-- ANCHOR -->
<div class="screen" id="s-anchor">
  <div class="a-instr" id="aInstr">
    Observe the incoming<br>and outgoing breath.<br><em>Note it.</em>
  </div>
  <div class="b-orb" id="bOrb" onclick="orbTap(event)">
    <span class="b-lbl" id="bLbl">in</span>
  </div>
  <button class="w-btn" id="wBtn" onclick="mindWandered(event)">mind wandered →</button>
</div>
<div class="ret-txt" id="retTxt"></div>

<!-- STORM -->
<div class="screen" id="s-storm">
  <div class="storm-inner">
    <div class="storm-toggle">
      <button class="storm-toggle-btn active" id="stormTapBtn" onclick="setStormMode('tap')">tap</button>
      <button class="storm-toggle-btn" id="stormWatchBtn" onclick="setStormMode('watch')">watch</button>
    </div>
    <div class="storm-word" id="sWord" onclick="stormAdvance(event)"></div>
    <div class="storm-sub" id="sHint">tap to release</div>
    <div class="storm-wit" id="sWit"></div>
  </div>
</div>

<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js');</script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Collapse↑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400&family=Cormorant+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--gold-bright:#f0cc88;--gold-dim:rgba(201,169,110,0.38);
  --cream:#f5ead6;--cream-dim:rgba(245,234,214,0.78);--cream-ghost:rgba(245,234,214,0.48);
  --ascending:#ffe8b0;--bg:#090805;
  --fb:clamp(19px,4.8vw,24px);--fs:clamp(16px,4vw,20px);--fl:clamp(12px,3vw,14px);
  --fw:clamp(58px,15vw,90px);--fwm:clamp(28px,7vw,38px);
  --fsa:clamp(140px,36vw,210px);--fsw:clamp(32px,8vw,48px);
}
body.large{--fb:clamp(23px,5.8vw,29px);--fs:clamp(19px,4.8vw,24px);--fl:clamp(14px,3.5vw,17px);--fw:clamp(64px,17vw,100px)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Lexend',sans-serif;font-weight:300;color:var(--cream);-webkit-font-smoothing:antialiased}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.4s!important}}
@media(prefers-contrast:high){:root{--cream:#fff;--gold:#ffd700;--gold-bright:#ffe44d;--bg:#000;--cream-dim:rgba(255,255,255,.88);--cream-ghost:rgba(255,255,255,.65)}}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.al{position:absolute;border-radius:50%;filter:blur(90px);opacity:0;transition:opacity 4s ease}
.al.on{opacity:1}
.a1{width:70vw;height:70vw;background:radial-gradient(circle,rgba(201,169,110,.11) 0%,transparent 70%);top:-15%;left:-15%;animation:d1 24s ease-in-out infinite}
.a2{width:55vw;height:55vw;background:radial-gradient(circle,rgba(255,220,140,.08) 0%,transparent 70%);bottom:-10%;right:-10%;animation:d2 30s ease-in-out infinite}
.a3{width:45vw;height:45vw;background:radial-gradient(circle,rgba(255,248,220,.06) 0%,transparent 70%);top:35%;left:25%;animation:d3 20s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(8vw,5vw)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,-7vw)}}
@keyframes d3{0%,100%{transform:translate(0,0)}50%{transform:translate(4vw,-4vw)}}
#particleCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.2s ease;padding:clamp(24px,6vw,48px) clamp(24px,6vw,40px)}
.screen.active{opacity:1;pointer-events:all}
.burst-el{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;border-radius:50%;background:radial-gradient(circle,rgba(255,232,176,.65) 0%,rgba(255,200,80,.25) 30%,transparent 70%);pointer-events:none;z-index:200;opacity:0}
.burst-el.go{animation:bx 1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes bx{0%{width:0;height:0;opacity:.85;margin:0}100%{width:200vmax;height:200vmax;margin:-100vmax;opacity:0}}
#ghosts{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity 1.4s ease}
.gst{position:absolute;font-family:'Cormorant SC',serif;font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.12);animation:gd 9s ease-in-out infinite}
@keyframes gd{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes tp{0%,100%{opacity:.45}50%{opacity:.9}}
.divider{width:44px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:4px auto}
#chrome{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:18px 22px;z-index:300}
.chrome-btn{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.12em;color:rgba(201,169,110,.65);background:none;border:none;cursor:pointer;padding:10px 14px;min-height:44px;min-width:52px;-webkit-tap-highlight-color:transparent;transition:color .5s ease;font-weight:300}
.chrome-btn:hover{color:var(--gold-bright)}

/* SIGIL */
#s-sigil{z-index:50;gap:28px}
.sigil-wrap{position:relative;width:clamp(160px,40vw,220px);height:clamp(180px,45vw,250px);display:flex;align-items:center;justify-content:center}
.sarrow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant SC',serif;font-size:var(--fsa);line-height:1;user-select:none;pointer-events:none}
.sarrow.ghost{color:var(--gold);opacity:0;filter:blur(6px)}
.sarrow.main{color:var(--gold-bright);opacity:0;filter:blur(20px);text-shadow:0 0 40px rgba(240,204,136,.5),0 0 100px rgba(201,169,110,.25)}
.sigil-wordmark{font-family:'Cormorant SC',serif;font-size:var(--fsw);letter-spacing:.2em;color:var(--gold);opacity:0;text-align:center}

/* INIT */
#s-init{justify-content:flex-start;padding-top:0;overflow:hidden}
.init-top{width:100%;display:flex;flex-direction:column;align-items:center;padding-top:clamp(52px,11vw,78px);padding-bottom:10px;flex-shrink:0}
.pdemo{position:relative;width:90px;height:90px;display:flex;align-items:center;justify-content:center}
.phalo{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,.09) 0%,transparent 65%);animation:halo 4s ease-in-out infinite}
@keyframes halo{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.pcore{width:14px;height:14px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 20px var(--gold),0 0 50px rgba(201,169,110,.3);position:relative;z-index:2;transition:box-shadow 2s ease}
.pcore.sp{animation:ps 3.5s ease-in-out infinite}
.pcore.stab{animation:pst 5s ease-in-out infinite}
.pcore.done{animation:none;box-shadow:0 0 28px var(--gold-bright),0 0 70px rgba(240,204,136,.45)}
.pcore.up{animation:pup .9s cubic-bezier(.16,1,.3,1) forwards}
@keyframes ps{0%,100%{transform:translate(0,0);filter:blur(0)}25%{transform:translate(5px,-3px);filter:blur(2px)}55%{transform:translate(-4px,4px);filter:blur(3px)}78%{transform:translate(3px,2px);filter:blur(1px)}}
@keyframes pst{0%,100%{transform:translate(0,0)}40%{transform:translate(2px,-1px);filter:blur(.4px)}70%{transform:translate(-1px,1px)}}
@keyframes pup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-100px) scale(.2);opacity:0}}
.pring{position:absolute;border-radius:50%;border:1px solid rgba(201,169,110,.18);transition:opacity 1.5s ease}
.pring:nth-child(2){width:34px;height:34px;animation:rp 3.5s ease-in-out infinite}
.pring:nth-child(3){width:56px;height:56px;animation:rp 3.5s ease-in-out .4s infinite}
.pring:nth-child(4){width:84px;height:84px;animation:rp 3.5s ease-in-out .8s infinite}
@keyframes rp{0%,100%{opacity:.3;transform:scale(.95)}50%{opacity:.1;transform:scale(1.05)}}
.pcloud{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(240,204,136,.22) 0%,rgba(201,169,110,.08) 40%,transparent 70%);animation:cp 3.5s ease-in-out infinite;transition:opacity 1.5s ease}
@keyframes cp{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
.init-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:360px;padding:0 4px 70px}
.step{display:none;flex-direction:column;align-items:center;gap:20px;width:100%;text-align:center}
.step.on{display:flex}
.s-label{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.2em;color:var(--gold);font-weight:300;text-transform:uppercase}
.s-big{font-size:var(--fb);font-weight:300;line-height:1.6;color:var(--cream)}
.s-big em{font-style:italic;color:var(--gold-bright)}
.s-small{font-size:var(--fs);font-weight:300;line-height:1.7;color:var(--cream-dim)}
.s-small em{color:var(--gold);font-style:normal}
.eq-box{width:100%;padding:18px 20px;border:1px solid var(--gold-dim);border-radius:4px;background:rgba(201,169,110,.04)}
.eq-box .eq{font-family:'Cormorant SC',serif;font-size:var(--fb);color:var(--gold-bright);letter-spacing:.04em;margin-bottom:8px}
.eq-box .eq-sub{font-family:'Lexend',sans-serif;font-size:var(--fl);color:var(--cream-ghost);letter-spacing:.06em}
.s-note{font-family:'Lexend',sans-serif;font-size:var(--fs);color:var(--cream-ghost);line-height:1.7;border-top:1px solid var(--gold-dim);padding-top:16px;width:100%;text-align:center}
.s-note span{color:var(--gold)}
#sdots{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;pointer-events:none}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(201,169,110,.2);transition:background .6s ease}
.sdot.on{background:rgba(201,169,110,.65)}
#taph{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.16em;color:rgba(201,169,110,.45);animation:tp 2.5s ease-in-out infinite;pointer-events:none;z-index:20;white-space:nowrap;font-weight:300}
.ready-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Lexend',sans-serif;font-size:var(--fs);letter-spacing:.12em;padding:18px 40px;cursor:pointer;border-radius:2px;min-height:58px;-webkit-tap-highlight-color:transparent;transition:all .6s ease;font-weight:300}
.ready-btn:hover,.ready-btn:active{background:rgba(201,169,110,.1);border-color:var(--gold);color:var(--gold-bright)}

/* FIELD */
#s-field{gap:16px}
.f-wordmark{font-family:'Cormorant SC',serif;font-size:var(--fwm);letter-spacing:.14em;color:var(--gold);cursor:default;user-select:none;-webkit-tap-highlight-color:transparent;padding:8px 16px;display:inline-block;transition:color .4s ease}
.f-wordmark .wm-arrow{display:inline-block;animation:wmA 3s ease-in-out infinite}
@keyframes wmA{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.f-wordmark.holding{color:var(--gold-bright)}
.f-line{font-size:var(--fs);color:var(--cream-dim);text-align:center;font-weight:300}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:390px}
.orb{display:flex;align-items:center;justify-content:center;height:clamp(76px,17vw,92px);border:1px solid rgba(201,169,110,.2);border-radius:8px;background:rgba(201,169,110,.025);cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:border-color .5s ease,background .5s ease,box-shadow .5s ease}
.orb::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(201,169,110,.12) 0%,transparent 70%);opacity:0;transition:opacity .5s ease}
.orb:hover::after,.orb:active::after{opacity:1}
.orb:hover{border-color:rgba(201,169,110,.4);box-shadow:0 0 20px rgba(201,169,110,.08)}
.orb:nth-child(1){animation:ob 4.1s ease-in-out infinite}
.orb:nth-child(2){animation:ob 5.3s ease-in-out infinite}
.orb:nth-child(3){animation:ob 3.7s ease-in-out infinite}
.orb:nth-child(4){animation:ob 6.1s ease-in-out infinite}
.orb:nth-child(5){animation:ob 4.8s ease-in-out infinite}
.orb:nth-child(6){animation:ob 3.4s ease-in-out infinite}
.orb:nth-child(7){animation:ob 5.7s ease-in-out infinite}
.orb:nth-child(8){animation:ob 4.4s ease-in-out infinite}
@keyframes ob{0%,100%{background:rgba(201,169,110,.025)}50%{background:rgba(201,169,110,.055)}}
.oname{font-family:'Cormorant SC',serif;font-size:var(--fwm);letter-spacing:.08em;color:var(--cream);position:relative;z-index:1;transition:color .4s ease,text-shadow .4s ease}
.orb:hover .oname,.orb:active .oname{color:var(--gold-bright);text-shadow:0 0 20px rgba(240,204,136,.5)}
.f-sub{font-size:var(--fs);color:var(--cream-ghost);text-align:center;font-weight:300}
.glyphs{display:flex;gap:28px;align-items:center}
.glyph{background:none;border:none;font-family:'Cormorant SC',serif;font-size:clamp(22px,5.5vw,28px);color:rgba(201,169,110,.35);cursor:pointer;padding:12px 18px;min-width:52px;min-height:52px;-webkit-tap-highlight-color:transparent;transition:color .4s ease}
.glyph:hover{color:var(--gold)}
.obs-ct{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.1em;color:rgba(201,169,110,.3);text-align:center;font-weight:300}

/* COLLAPSE */
#s-collapse{cursor:pointer;-webkit-tap-highlight-color:transparent}
.cp-stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:clamp(24px,6vw,48px) clamp(24px,6vw,40px);text-align:center;opacity:0;pointer-events:none;transition:opacity .9s ease}
.cp-stage.on{opacity:1;pointer-events:all}
.stage-inner{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%;max-width:370px}
.collapsed-dot{width:14px;height:14px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 20px var(--gold-bright),0 0 60px rgba(240,204,136,.4);animation:cdg 3s ease-in-out infinite;margin:0 auto}
@keyframes cdg{0%,100%{box-shadow:0 0 20px var(--gold-bright),0 0 60px rgba(240,204,136,.38)}50%{box-shadow:0 0 28px var(--gold-bright),0 0 80px rgba(240,204,136,.5)}}
.cword{font-family:'Cormorant SC',serif;font-size:var(--fw);letter-spacing:.08em;color:var(--ascending);text-shadow:0 0 40px rgba(255,232,176,.65),0 0 80px rgba(255,200,80,.3);line-height:1}
.c-confirm-label{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.16em;color:var(--gold);display:block;font-weight:300}
.c-confirm-sub{font-size:var(--fs);color:var(--cream-ghost);font-weight:300}
.c-eq-box{width:100%;padding:20px 22px;border:1px solid rgba(201,169,110,.2);border-radius:6px;background:rgba(201,169,110,.03)}
.c-eq{font-family:'Cormorant SC',serif;font-size:var(--fb);color:rgba(201,169,110,.78);letter-spacing:.03em;margin-bottom:10px}
.c-eq-note{font-size:var(--fs);color:var(--cream-ghost);font-weight:300}
.imag-label{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.2em;color:var(--gold-dim);text-transform:uppercase;font-weight:300;display:block}
.imag-prompt{font-size:var(--fb);color:var(--cream-dim);line-height:1.78;font-style:italic;max-width:330px;font-weight:300}
.breath-wrap{display:flex;flex-direction:column;align-items:center;gap:28px;width:100%}
.bpwrap{position:relative;display:flex;align-items:center;justify-content:center;width:80px;height:80px}
.bp{width:22px;height:22px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 18px var(--gold),0 0 50px rgba(201,169,110,.28)}
.bp.neutral{transition:transform .8s ease,filter .8s ease,box-shadow .8s ease}
.bp.inhaling{transition:transform 4s cubic-bezier(.4,0,.2,1),filter 4s cubic-bezier(.4,0,.2,1),box-shadow 4s ease;transform:scale(2.8);filter:blur(3px);box-shadow:0 0 8px rgba(201,169,110,.2),0 0 50px rgba(201,169,110,.08)}
.bp.holding{transition:transform 1.2s ease,filter 1.2s ease;transform:scale(2.8);filter:blur(2px)}
.bp.exhaling{transition:transform 4s cubic-bezier(.4,0,.2,1),filter 4s cubic-bezier(.4,0,.2,1),box-shadow 4s ease;transform:scale(1);filter:blur(0);box-shadow:0 0 28px var(--gold-bright),0 0 80px rgba(240,204,136,.45),0 0 120px rgba(255,232,176,.2)}
.bripple{position:absolute;width:22px;height:22px;border-radius:50%;border:1px solid rgba(201,169,110,.4);pointer-events:none;opacity:0}
.bripple.expand{animation:ripOut 4s cubic-bezier(.4,0,.2,1) forwards}
@keyframes ripOut{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(8)}}
.binstr{font-size:var(--fb);color:var(--cream);min-height:36px;transition:opacity .5s ease;font-weight:300;text-align:center}
.bsname{font-family:'Cormorant SC',serif;font-size:var(--fb);letter-spacing:.15em;color:var(--gold);opacity:0;transition:opacity 1s ease}
.bctr{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.16em;color:var(--gold-dim);font-weight:300}
.bend{font-size:var(--fs);color:var(--cream-dim);line-height:1.7;opacity:0;transition:opacity 1.2s ease;max-width:310px;text-align:center;font-weight:300}
.bend.on{opacity:1}
.bend strong{color:var(--gold);font-weight:400;font-family:'Cormorant SC',serif;font-size:1.05em}
.obs-note{font-size:var(--fb);color:var(--cream-dim);line-height:1.7;max-width:330px;font-weight:300}
.obs-note strong{color:var(--gold-bright);font-weight:400;font-family:'Cormorant SC',serif;font-size:1.08em;letter-spacing:.05em}
.q-label{font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.2em;color:var(--gold-dim);display:block;margin-bottom:18px;font-weight:300;text-transform:uppercase}
.q-text{font-size:var(--fb);color:var(--cream);line-height:1.65;font-weight:300}
.closing{font-size:var(--fs);color:rgba(201,169,110,.5);max-width:290px;font-weight:300;line-height:1.6}
.closing-letter{display:inline;opacity:0;animation:fadeIn .05s ease forwards}
.return-btn{background:none;border:none;color:rgba(201,169,110,.45);font-family:'Lexend',sans-serif;font-size:var(--fs);letter-spacing:.14em;cursor:pointer;padding:16px 32px;min-height:52px;-webkit-tap-highlight-color:transparent;transition:color .5s ease;font-weight:300}
.return-btn:hover{color:var(--gold)}
#tapNext{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-family:'Lexend',sans-serif;font-size:var(--fl);letter-spacing:.16em;color:rgba(201,169,110,.38);pointer-events:none;z-index:20;animation:tp 2.5s ease-in-out infinite;white-space:nowrap;font-weight:300;transition:opacity .7s ease}

/* STILL */
#s-still{gap:30px}
.still-p{width:20px;height:20px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 28px var(--gold),0 0 70px rgba(201,169,110,.28);animation:sb 6s ease-in-out infinite}
@keyframes sb{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.still-txt{font-size:var(--fb);color:var(--cream-dim);text-align:center;line-height:1.8;font-weight:300}
.still-tmr{font-family:'Cormorant SC',serif;font-size:var(--fb);letter-spacing:.2em;color:var(--gold-dim)}
</style>
</head>
<body>
<div class="aurora"><div class="al a1"></div><div class="al a2"></div><div class="al a3"></div></div>
<canvas id="particleCanvas"></canvas>
<div class="burst-el" id="burst"></div>
<div id="ghosts"></div>
<div id="chrome">
  <button class="chrome-btn" id="langBtn">EN / ES</button>
  <button class="chrome-btn" id="fontBtn">A+</button>
</div>
<div class="screen active" id="s-sigil">
  <div class="sigil-wrap">
    <div class="sarrow ghost" id="sg1">↑</div>
    <div class="sarrow ghost" id="sg2">↑</div>
    <div class="sarrow ghost" id="sg3">↑</div>
    <div class="sarrow main" id="smain">↑</div>
  </div>
  <div class="sigil-wordmark" id="sigilWm">Collapse↑</div>
</div>
<div class="screen" id="s-init">
  <div class="init-top">
    <div class="pdemo">
      <div class="phalo"></div>
      <div class="pring"></div><div class="pring"></div><div class="pring"></div>
      <div class="pcloud"></div>
      <div class="pcore sp" id="pcore"></div>
    </div>
  </div>
  <div class="init-body" id="initBody"></div>
  <div id="sdots"></div>
  <div id="taph"></div>
</div>
<div class="screen" id="s-field">
  <div style="text-align:center">
    <div class="f-wordmark" id="fwm">Collapse<span class="wm-arrow">↑</span></div>
    <div class="f-line" id="fline"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="f-sub" id="fsub"></div>
  <div class="glyphs">
    <button class="glyph" id="gStill">—</button>
    <button class="glyph" id="gBreath">↑</button>
  </div>
  <div class="obs-ct" id="obsCt"></div>
</div>
<div class="screen" id="s-collapse">
  <div class="cp-stage" id="cs1"><div class="stage-inner">
    <div class="collapsed-dot"></div>
    <div class="cword" id="cword"></div>
    <div><span class="c-confirm-label" id="cLabel"></span><span class="c-confirm-sub" id="cSub"></span></div>
  </div></div>
  <div class="cp-stage" id="cs2"><div class="stage-inner">
    <div class="c-eq-box"><div class="c-eq" id="ceq"></div><div class="c-eq-note" id="ceqNote"></div></div>
  </div></div>
  <div class="cp-stage" id="cs3"><div class="stage-inner">
    <span class="imag-label" id="imagLabel"></span>
    <div class="imag-prompt" id="imagPrompt"></div>
  </div></div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Collapse↑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a96e;
  --gold-bright: #f0cc88;
  --gold-dim: rgba(201,169,110,0.28);
  --cream: #f5ead6;
  --cream-dim: rgba(245,234,214,0.52);
  --cream-ghost: rgba(245,234,214,0.16);
  --ascending: #ffe8b0;
  --bg: #090805;

  /* TWO FONT SIZES ONLY */
  --f-large: clamp(20px, 5.2vw, 26px);
  --f-small: clamp(15px, 3.8vw, 18px);
  --f-word: clamp(56px, 15vw, 88px);
  --f-label: clamp(11px, 2.6vw, 13px);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
}

body.large { --f-large: clamp(24px, 6vw, 30px); --f-small: clamp(18px, 4.5vw, 22px); --f-word: clamp(60px, 16vw, 96px); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.3s !important; }
}
@media (prefers-contrast: high) {
  :root { --cream: #fff; --gold: #ffd700; --gold-bright: #ffe44d; --bg: #000; }
}

/* ── AURORA ── */
.aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.al {
  position: absolute; border-radius: 50%; filter: blur(90px);
  opacity: 0; transition: opacity 4s ease;
}
.al.on { opacity: 1; }
.a1 { width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(201,169,110,0.1) 0%, transparent 70%); top: -15%; left: -15%; animation: d1 24s ease-in-out infinite; }
.a2 { width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(255,220,140,0.07) 0%, transparent 70%); bottom: -10%; right: -10%; animation: d2 30s ease-in-out infinite; }
.a3 { width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(255,248,220,0.05) 0%, transparent 70%); top: 35%; left: 25%; animation: d3 20s ease-in-out infinite; }
@keyframes d1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(8vw,5vw)} }
@keyframes d2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5vw,-7vw)} }
@keyframes d3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4vw,-4vw)} }

#particleCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.8s ease;
  padding: clamp(24px,6vw,48px) clamp(24px,6vw,40px);
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── LIGHT BURST ── */
.burst-el {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 0; height: 0; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,232,176,0.65) 0%, rgba(255,200,80,0.25) 30%, transparent 70%);
  pointer-events: none; z-index: 100; opacity: 0;
}
.burst-el.go { animation: bx 0.9s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes bx { 0%{width:0;height:0;opacity:0.85;margin:0} 100%{width:200vmax;height:200vmax;margin:-100vmax;opacity:0} }

/* ── GHOST STATES ── */
#ghosts { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
.gst {
  position: absolute;
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label);
  letter-spacing: 0.14em;
  color: rgba(201,169,110,0.09);
  animation: gd 9s ease-in-out infinite;
}
@keyframes gd { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── UI CHROME ── */
#chrome {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; z-index: 200;
}
.chrome-btn {
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label);
  letter-spacing: 0.18em;
  color: rgba(201,169,110,0.32);
  background: none; border: none; cursor: pointer;
  padding: 10px 14px; min-height: 44px; min-width: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.3s ease;
}
.chrome-btn:hover, .chrome-btn.lit { color: var(--gold); }

/* ═══════════════════════════════
   INITIATION
═══════════════════════════════ */
#s-init { justify-content: flex-start; padding-top: 0; overflow: hidden; }

.init-top {
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding-top: clamp(56px, 12vw, 84px);
  padding-bottom: 16px;
  flex-shrink: 0;
}

/* particle */
.pdemo {
  position: relative; width: 96px; height: 96px;
  display: flex; align-items: center; justify-content: center;
}
.pcore {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--gold-bright);
  box-shadow: 0 0 18px var(--gold), 0 0 50px rgba(201,169,110,0.3);
  position: relative; z-index: 2;
  transition: box-shadow 2s ease;
}
.pcore.sp { animation: ps 3.5s ease-in-out infinite; }
.pcore.stab { animation: pst 5s ease-in-out infinite; }
.pcore.done { animation: none; box-shadow: 0 0 28px var(--gold-bright), 0 0 70px rgba(240,204,136,0.45); }
.pcore.up { animation: pup 0.9s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes ps { 0%,100%{transform:translate(0,0);filter:blur(0)} 25%{transform:translate(5px,-3px);filter:blur(2px)} 55%{transform:translate(-4px,4px);filter:blur(3px)} 78%{transform:translate(3px,2px);filter:blur(1px)} }
@keyframes pst { 0%,100%{transform:translate(0,0)} 40%{transform:translate(2px,-1px);filter:blur(0.4px)} 70%{transform:translate(-1px,1px)} }
@keyframes pup { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-110px) scale(0.2);opacity:0} }

.pring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.16);
  transition: opacity 1.5s ease;
}
.pring:nth-child(1){width:36px;height:36px;animation:rp 3.5s ease-in-out infinite}
.pring:nth-child(2){width:60px;height:60px;animation:rp 3.5s ease-in-out 0.4s infinite}
.pring:nth-child(3){width:88px;height:88px;animation:rp 3.5s ease-in-out 0.8s infinite}
@keyframes rp { 0%,100%{opacity:0.3;transform:scale(0.95)} 50%{opacity:0.1;transform:scale(1.05)} }
.pcloud {
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle, rgba(240,204,136,0.25) 0%, rgba(201,169,110,0.08) 40%, transparent 70%);
  animation: cp 3.5s ease-in-out infinite;
  transition: opacity 1.5s ease;
}
@keyframes cp { 0%,100%{opacity:0.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }

/* step area */
.init-body {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; max-width: 340px;
  padding: 0 4px 72px;
}

.step {
  display: none; flex-direction: column;
  align-items: center; gap: 18px; width: 100%;
  text-align: center;
}
.step.on {
  display: flex;
  animation: fadeUp 0.6s ease forwards;
}

.s-label {
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label);
  letter-spacing: 0.24em;
  color: var(--gold-dim);
}
.s-big {
  font-size: var(--f-large);
  font-weight: 300;
  line-height: 1.55;
  color: var(--cream);
}
.s-big em { font-style: italic; color: var(--gold-bright); }
.s-small {
  font-size: var(--f-small);
  font-weight: 300;
  line-height: 1.65;
  color: var(--cream-dim);
  font-style: italic;
}
.s-small em { color: var(--gold); font-style: normal; }

.eq-box {
  width: 100%; padding: 16px 18px;
  border: 1px solid var(--gold-dim); border-radius: 4px;
  background: rgba(201,169,110,0.035);
}
.eq-box .eq { font-size: var(--f-small); color: var(--gold-bright); letter-spacing: 0.03em; margin-bottom: 6px; }
.eq-box .eq-sub { font-size: var(--f-label); color: var(--cream-ghost); font-style: italic; letter-spacing: 0.06em; }

.s-note {
  font-size: var(--f-small);
  color: var(--cream-ghost);
  font-style: italic;
  line-height: 1.65;
  border-top: 1px solid var(--gold-dim);
  padding-top: 14px;
  width: 100%;
  text-align: center;
}
.s-note span { color: rgba(201,169,110,0.5); }

.divider { width: 44px; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim), transparent); margin: 2px auto; }

/* step dots */
#sdots {
  position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 7px; z-index: 20; pointer-events: none;
}
.sdot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(201,169,110,0.18);
  transition: background 0.4s ease;
}
.sdot.on { background: rgba(201,169,110,0.58); }

#taph {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label); letter-spacing: 0.2em;
  color: rgba(201,169,110,0.22);
  animation: tp 2.5s ease-in-out infinite;
  pointer-events: none; z-index: 20; white-space: nowrap;
}
@keyframes tp { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

.ready-btn {
  background: none; border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-small); letter-spacing: 0.18em;
  padding: 18px 40px; cursor: pointer;
  border-radius: 2px; min-height: 58px;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.4s ease;
}
.ready-btn:hover, .ready-btn:active {
  background: rgba(201,169,110,0.09);
  border-color: var(--gold); color: var(--gold-bright);
}

/* ═══════════════════════════════
   FIELD
═══════════════════════════════ */
#s-field { gap: 18px; }

.f-wordmark {
  font-family: 'Cormorant SC', serif;
  font-size: clamp(26px, 6.5vw, 36px);
  letter-spacing: 0.14em;
  color: var(--gold);
  cursor: default; user-select: none;
  -webkit-tap-highlight-color: transparent;
  padding: 8px 18px;
  transition: color 0.3s ease;
  display: inline-block;
}
.f-wordmark.holding { color: var(--gold-bright); }

.f-line {
  font-size: var(--f-small);
  color: var(--cream-dim);
  font-style: italic;
  text-align: center;
}

.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; width: 100%; max-width: 380px;
}
.orb {
  display: flex; align-items: center; justify-content: center;
  height: clamp(72px,16vw,90px);
  border: 1px solid rgba(201,169,110,0.17);
  border-radius: 6px;
  background: rgba(201,169,110,0.02);
  cursor: pointer; position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.3s ease, background 0.3s ease;
}
.orb::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(201,169,110,0.1) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.3s ease;
}
.orb:hover::after, .orb:active::after { opacity: 1; }
.orb:hover { border-color: rgba(201,169,110,0.32); }

/* different breath rates */
.orb:nth-child(1){animation:ob 4.1s ease-in-out infinite}
.orb:nth-child(2){animation:ob 5.3s ease-in-out infinite}
.orb:nth-child(3){animation:ob 3.7s ease-in-out infinite}
.orb:nth-child(4){animation:ob 6.1s ease-in-out infinite}
.orb:nth-child(5){animation:ob 4.8s ease-in-out infinite}
.orb:nth-child(6){animation:ob 3.4s ease-in-out infinite}
.orb:nth-child(7){animation:ob 5.7s ease-in-out infinite}
.orb:nth-child(8){animation:ob 4.4s ease-in-out infinite}
@keyframes ob { 0%,100%{background:rgba(201,169,110,0.02)} 50%{background:rgba(201,169,110,0.05)} }

.oname {
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-large);
  letter-spacing: 0.1em;
  color: var(--cream);
  position: relative; z-index: 1;
  transition: color 0.3s ease, text-shadow 0.3s ease;
}
.orb:hover .oname, .orb:active .oname {
  color: var(--gold-bright);
  text-shadow: 0 0 18px rgba(240,204,136,0.45);
}

.f-sub { font-size: var(--f-small); color: var(--cream-ghost); font-style: italic; text-align: center; }

.glyphs { display: flex; gap: 24px; align-items: center; }
.glyph {
  background: none; border: none;
  font-size: clamp(20px,5vw,26px);
  color: rgba(201,169,110,0.28);
  cursor: pointer; padding: 12px 16px;
  min-width: 50px; min-height: 50px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.3s ease;
}
.glyph:hover { color: var(--gold); }

.obs-ct {
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label); letter-spacing: 0.15em;
  color: rgba(201,169,110,0.22); text-align: center;
}

/* ═══════════════════════════════
   COLLAPSE — TAP THROUGH
═══════════════════════════════ */
#s-collapse { cursor: pointer; -webkit-tap-highlight-color: transparent; }

.cp-stage {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; width: 100%; max-width: 360px;
  text-align: center; min-height: 60vh;
}
.cp-stage.on {
  display: flex;
  animation: fadeIn 0.7s ease forwards;
}

/* Stage 1 — the word */
.cword {
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-word);
  letter-spacing: 0.08em;
  color: var(--ascending);
  text-shadow: 0 0 40px rgba(255,232,176,0.65), 0 0 80px rgba(255,200,80,0.3);
  line-height: 1;
}
.collapsed-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--gold-bright);
  box-shadow: 0 0 20px var(--gold-bright), 0 0 60px rgba(240,204,136,0.4);
  animation: cdg 3s ease-in-out infinite;
  margin: 0 auto;
}
@keyframes cdg { 0%,100%{box-shadow:0 0 20px var(--gold-bright),0 0 60px rgba(240,204,136,0.4)} 50%{box-shadow:0 0 28px var(--gold-bright),0 0 80px rgba(240,204,136,0.5)} }

.c-confirm-label {
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label); letter-spacing: 0.22em;
  color: var(--gold); display: block;
}
.c-confirm-sub { font-size: var(--f-small); color: var(--cream-ghost); font-style: italic; }

/* Stage 2 — equation */
.c-eq-box {
  width: 100%; padding: 18px 20px;
  border: 1px solid rgba(201,169,110,0.15); border-radius: 4px;
}
.c-eq { font-size: var(--f-small); color: rgba(201,169,110,0.65); letter-spacing: 0.03em; margin-bottom: 8px; }
.c-eq-note { font-size: var(--f-small); color: var(--cream-ghost); font-style: italic; }

/* Stage 3 — breath */
.breath-wrap { display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; }
.bp {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--gold-bright);
  box-shadow: 0 0 18px var(--gold), 0 0 50px rgba(201,169,110,0.28);
  transition: transform 4s ease-in-out, box-shadow 4s ease-in-out, filter 4s ease-in-out;
}
.bp.bi { transform: scale(2.8); filter: blur(3px); box-shadow: 0 0 8px rgba(201,169,110,0.2), 0 0 60px rgba(201,169,110,0.1); }
.bp.be { transform: scale(1); filter: blur(0); box-shadow: 0 0 28px var(--gold-bright), 0 0 80px rgba(240,204,136,0.45), 0 0 120px rgba(255,232,176,0.2); }

.binstr { font-size: var(--f-large); color: var(--cream); font-style: italic; min-height: 40px; transition: opacity 0.6s ease; }
.bsname { font-family: 'Cormorant SC', serif; font-size: var(--f-small); letter-spacing: 0.15em; color: var(--gold); opacity: 0; transition: opacity 0.8s ease; }
.bctr { font-family: 'Cormorant SC', serif; font-size: var(--f-label); letter-spacing: 0.2em; color: var(--gold-dim); }
.bend { font-size: var(--f-small); color: var(--cream-dim); font-style: italic; line-height: 1.65; opacity: 0; transition: opacity 0.8s ease; max-width: 300px; }
.bend.on { opacity: 1; }
.bend strong { color: var(--gold); font-style: normal; font-weight: 400; }

/* Stage 4 — observation note */
.obs-note { font-size: var(--f-large); color: var(--cream-dim); font-style: italic; line-height: 1.65; max-width: 320px; }
.obs-note strong { color: var(--gold); font-style: normal; font-weight: 400; }

/* Stage 5 — question */
.q-label { font-family: 'Cormorant SC', serif; font-size: var(--f-label); letter-spacing: 0.24em; color: var(--gold-dim); display: block; margin-bottom: 16px; }
.q-text { font-size: var(--f-large); font-style: italic; line-height: 1.55; color: var(--cream); }

.tap-next {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-label); letter-spacing: 0.2em;
  color: rgba(201,169,110,0.22);
  pointer-events: none; z-index: 20;
  animation: tp 2.5s ease-in-out infinite;
  white-space: nowrap;
}

.return-btn {
  background: none; border: none;
  color: rgba(201,169,110,0.32);
  font-family: 'Cormorant SC', serif;
  font-size: var(--f-small); letter-spacing: 0.2em;
  cursor: pointer; padding: 16px 32px; min-height: 52px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.3s ease;
}
.return-btn:hover { color: var(--gold); }

.closing { font-size: var(--f-small); color: rgba(201,169,110,0.35); font-style: italic; max-width: 280px; }

/* ═══════════════════════════════
   STILL
═══════════════════════════════ */
#s-still { gap: 28px; }
.still-p {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold-bright);
  box-shadow: 0 0 28px var(--gold), 0 0 70px rgba(201,169,110,0.28);
  animation: sb 6s ease-in-out infinite;
}
@keyframes sb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.still-txt { font-size: var(--f-large); color: var(--cream-dim); font-style: italic; text-align: center; line-height: 1.7; }
.still-tmr { font-family: 'Cormorant SC', serif; font-size: var(--f-small); letter-spacing: 0.2em; color: var(--gold-dim); }
</style>
</head>
<body>

<div class="aurora">
  <div class="al a1"></div>
  <div class="al a2"></div>
  <div class="al a3"></div>
</div>

<canvas id="particleCanvas"></canvas>
<div class="burst-el" id="burst"></div>
<div id="ghosts"></div>

<!-- Chrome -->
<div id="chrome">
  <button class="chrome-btn" id="langBtn">EN</button>
  <button class="chrome-btn" id="fontBtn">A+</button>
</div>

<!-- ══ INITIATION ══ -->
<div class="screen" id="s-init">
  <div class="init-top">
    <div class="pdemo" id="pdemo">
      <div class="pring"></div>
      <div class="pring"></div>
      <div class="pring"></div>
      <div class="pcloud"></div>
      <div class="pcore sp" id="pcore"></div>
    </div>
  </div>
  <div class="init-body" id="initBody"></div>
  <div id="sdots"></div>
  <div id="taph"></div>
</div>

<!-- ══ FIELD ══ -->
<div class="screen" id="s-field">
  <div style="text-align:center">
    <div class="f-wordmark" id="fwm">Collapse↑</div>
    <div class="f-line" id="fline"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="f-sub" id="fsub"></div>
  <div class="glyphs">
    <button class="glyph" id="gStill">—</button>
    <button class="glyph" id="gBreath">↑</button>
  </div>
  <div class="obs-ct" id="obsCt"></div>
</div>

<!-- ══ COLLAPSE ══ -->
<div class="screen" id="s-collapse">
  <!-- Stage 1: word -->
  <div class="cp-stage" id="cs1">
    <div class="collapsed-dot"></div>
    <div class="cword" id="cword"></div>
    <div>
      <span class="c-confirm-label" id="cLabel"></span>
      <span class="c-confirm-sub" id="cSub"></span>
    </div>
  </div>

  <!-- Stage 2: equation -->
  <div class="cp-stage" id="cs2">
    <div class="c-eq-box">
      <div class="c-eq" id="ceq"></div>
      <div class="c-eq-note" id="ceqNote"></div>
    </div>
  </div>

  <!-- Stage 3: breath -->

// ═══ AUDIO ═══
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function tryDrone() {
  initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') { audioCtx.resume().then(playDrone); return; }
  playDrone();
}
function playDrone() {
  if (!audioCtx || droneNodes.length) return;
  [432,216,144,108].forEach((f,i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.024 - i*0.005, audioCtx.currentTime + 3);
    o.connect(g); g.connect(audioCtx.destination); o.start();
    droneNodes.push({o,g});
  });
}
function playCollapseSound() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(220, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 1);
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.2);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.6);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 2);
  const b = audioCtx.createOscillator(), bg = audioCtx.createGain();
  b.type = 'sine'; b.frequency.value = 1320;
  bg.gain.setValueAtTime(0.06, audioCtx.currentTime + 0.75);
  bg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.5);
  b.connect(bg); bg.connect(audioCtx.destination);
  b.start(audioCtx.currentTime + 0.75); b.stop(audioCtx.currentTime + 4);
}

// ═══ PARTICLES ═══
const cv = document.getElementById('particleCanvas');
const cx = cv.getContext('2d');
let pts = [];
function rsz() { cv.width = innerWidth; cv.height = innerHeight; }
window.addEventListener('resize', rsz); rsz();
class Pt {
  constructor(){this.reset();}
  reset(){this.x=Math.random()*cv.width;this.y=Math.random()*cv.height;this.vx=(Math.random()-.5)*.22;this.vy=(Math.random()-.5)*.22-.07;this.r=Math.random()*1.1+.2;this.op=Math.random()*.3+.07;this.life=0;this.ml=Math.random()*260+130;}
  update(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.ml||this.y<-10)this.reset();}
  draw(){const a=this.op*(1-(this.life/this.ml)**2);cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle=`rgba(201,169,110,${a})`;cx.fill();}
}
function initPts(){pts=Array.from({length:50},()=>new Pt());}
function animPts(){cx.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animPts);}
initPts(); animPts();

// ═══ INITIATION ═══
function buildInit() {
  const steps = STEPS[lang];
  const body = document.getElementById('initBody');
  body.innerHTML = '';

  steps.forEach((s,i) => {
    const div = document.createElement('div');
    div.className = 'step' + (i===0?' on':'');
    div.dataset.i = i;
    let h = `<div class="s-label">${s.label}</div>`;
    if (s.big) h += `<div class="s-big">${s.big.replace(/\n/g,'<br>')}</div>`;
    if (s.eq) h += `<div class="eq-box"><div class="eq">${s.eq}</div><div class="eq-sub">${s.eqSub}</div></div>`;
    if (s.small) h += `<div class="s-small">${s.small.replace(/\n/g,'<br>')}</div>`;
    if (s.note) h += `<div class="s-note">${s.note}</div>`;
    if (s.isLast) h += `<button class="ready-btn" id="readyBtn">${lang==='en'?'I am ready to observe':'Estoy listo para observar'}</button>`;
    div.innerHTML = h;
    if (s.isLast) div.querySelector('#readyBtn').addEventListener('click', enterField);
    body.appendChild(div);
  });

  // dots
  const dots = document.getElementById('sdots');
  dots.innerHTML = '';
  steps.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'sdot' + (i===0?' on':'');
    dots.appendChild(d);
  });

  const hint = document.getElementById('taph');
  hint.textContent = T[lang].tapHint;
  curStep = 0;
  setPcore(steps[0].ps);
}

function setPcore(state) {
  const p = document.getElementById('pcore');
  if (!p) return;
  p.className = 'pcore ' + state;
  const rings = document.querySelectorAll('.pring');
  const cloud = document.querySelector('.pcloud');
  if (state==='stab'){rings.forEach(r=>r.style.opacity='.35');if(cloud)cloud.style.opacity='.5';}
  else if (state==='done'){rings.forEach(r=>r.style.opacity='.08');if(cloud)cloud.style.opacity='.12';}
  else {rings.forEach(r=>r.style.opacity='');if(cloud)cloud.style.opacity='';}
}

document.getElementById('s-init').addEventListener('click', e => {
  if (e.target.id==='readyBtn'||e.target.classList.contains('ready-btn')) return;
  if (e.target.closest('#chrome')) return;
  const steps = STEPS[lang];
  if (curStep < steps.length - 1) {
    document.querySelector('.step.on').classList.remove('on');
    curStep++;
    const next = document.querySelector(`.step[data-i="${curStep}"]`);
    if (next) { next.classList.add('on'); next.style.animation='none'; void next.offsetWidth; next.style.animation=''; }
    document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('on', i<=curStep));
    setPcore(steps[curStep].ps);
    const hint = document.getElementById('taph');
    hint.textContent = steps[curStep].isLast ? T[lang].tapHintLast : T[lang].tapHint;
  }
});

// ═══ FIELD ═══
function buildField() {

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  STATES[lang].forEach(st => {
    const o = document.createElement('div');
    o.className = 'orb';
    o.innerHTML = `<div class="oname">${st.name}</div>`;
    const go = () => selectState(st);
    o.addEventListener('click', go);
    o.addEventListener('touchend', e => { e.preventDefault(); go(); });
    grid.appendChild(o);
  });

  document.querySelectorAll('.al').forEach(l=>l.classList.add('on'));
  document.getElementById('chrome').style.pointerEvents = 'all';
}

// ═══ SELECT STATE ═══
function selectState(state) {
  if (navigator.vibrate) navigator.vibrate(38);
  initAudio();
  if (audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  playCollapseSound();

  const b = document.getElementById('burst');
  b.classList.remove('go'); void b.offsetWidth; b.classList.add('go');

  const pc = document.getElementById('pcore');
  if (pc) { pc.className='pcore up'; setTimeout(()=>{ if(pc) pc.className='pcore sp'; },1000); }

  totalObs++; if (!stateObs[state.name]) stateObs[state.name]=0; stateObs[state.name]++;
  localStorage.setItem('cu_obs', totalObs);
  localStorage.setItem('cu_sobs', JSON.stringify(stateObs));
  curStateName = state.name;

  // ghost states
  const gh = document.getElementById('ghosts');
  gh.innerHTML = '';
  const pos=[{top:'7%',left:'4%'},{top:'11%',right:'5%'},{bottom:'17%',left:'5%'},{bottom:'21%',right:'4%'},{top:'43%',left:'2%'},{top:'39%',right:'3%'},{top:'23%',left:'46%'},{bottom:'36%',right:'26%'}];
  STATES[lang].filter(s=>s.name!==state.name).forEach((s,i)=>{
    const g=document.createElement('div');
    g.className='gst'; g.textContent=s.name;
    Object.assign(g.style, pos[i]||{top:Math.random()*70+'%',left:Math.random()*70+'%'});
    g.style.animationDelay=(i*.3)+'s';
    gh.appendChild(g);
  });
  setTimeout(()=>gh.style.opacity='1',1400);
  gh.style.opacity='0'; gh.style.transition='opacity 1s ease';

  // fill collapse stages
  const t = T[lang];
  const n = stateObs[state.name];

  document.getElementById('cword').textContent = state.name;
  document.getElementById('cLabel').textContent = t.cLabel;
  document.getElementById('cSub').textContent = t.cSub;
  document.getElementById('ceq').textContent = state.eq;
  document.getElementById('ceqNote').textContent = t.ceqNote;
  document.getElementById('obsNote').innerHTML = (n===1 ? t.obsFirst(state.name) : t.obsMany(state.name,n)).replace(/\n/g,'<br>');
  document.getElementById('qlabel').textContent = t.qlabel;
  document.getElementById('qtext').textContent = state.question;
  document.getElementById('retBtn').textContent = t.retBtn;
  document.getElementById('closing').textContent = t.closings[Math.floor(Math.random()*t.closings.length)];
  document.getElementById('tapNext').textContent = t.tapHint;

  // reset stages
  collapseStage = 0;
  document.querySelectorAll('.cp-stage').forEach(s=>s.classList.remove('on'));
  showCollapseStage(1);

  // stop breath if running
  clearTimeout(breathTimeout); breathRunning=false;

  setTimeout(() => { gh.style.opacity='0'; show('s-collapse'); }, 160);
}

function showCollapseStage(n) {
  collapseStage = n;
  document.querySelectorAll('.cp-stage').forEach(s=>s.classList.remove('on'));
  const el = document.getElementById('cs'+n);
  if (el) { el.classList.add('on'); el.style.animation='none'; void el.offsetWidth; el.style.animation=''; }

  const t = T[lang];
  const tapEl = document.getElementById('tapNext');
  if (n < 5) { tapEl.textContent = t.tapHint; tapEl.style.opacity='1'; }
  else { tapEl.style.opacity='0'; }

  if (n===3) startBreath();
}

document.getElementById('s-collapse').addEventListener('click', e => {
  if (e.target.id==='retBtn'||e.target.classList.contains('return-btn')) return;
  if (e.target.closest('#chrome')) return;
  if (collapseStage===3 && breathRunning) return; // don't skip breath
  if (collapseStage < 5) showCollapseStage(collapseStage+1);
});

// ═══ BREATH ═══
function startBreath() {
  breathRunning = true;
  breathCycle = 0;
  const stateName = curStateName;
  const t = T[lang];
  const p = document.getElementById('bp');
  const instr = document.getElementById('binstr');
  const sn = document.getElementById('bsname');
  const ctr = document.getElementById('bctr');
  const bend = document.getElementById('bend');

  p.className = 'bp';
  sn.style.opacity = '0';
  bend.classList.remove('on');
  bend.innerHTML = '';

  function cycle() {
    if (breathCycle >= 3) {
      // done
      breathRunning = false;
      instr.style.opacity='0';
      sn.style.opacity='1';
      bend.innerHTML = `<p>${t.breathEnd(stateName).replace(/\n/g,'<br>')}</p>`;
      bend.classList.add('on');
      ctr.textContent = '';
      // auto advance after 3s
      breathTimeout = setTimeout(()=>{ if(collapseStage===3) showCollapseStage(4); },3200);
      return;
    }
    breathCycle++;
    ctr.textContent = t.breathCycles(breathCycle, 3);

    instr.textContent = t.breathInhale;
    instr.style.opacity='1';
    p.classList.remove('be'); p.classList.add('bi');
    sn.style.opacity='0';

    breathTimeout = setTimeout(()=>{
      instr.textContent = t.breathHold;
      breathTimeout = setTimeout(()=>{
        instr.textContent = t.breathExhale(stateName);
        p.classList.remove('bi'); p.classList.add('be');
        sn.style.opacity='1';
        breathTimeout = setTimeout(()=>{
          sn.style.opacity='0';
          p.classList.remove('be');
          breathTimeout = setTimeout(cycle, 500);
        }, 4000);
      }, 1000);
    }, 4000);
  }
  cycle();
}

// ═══ RETURN TO FIELD ═══
document.getElementById('retBtn').addEventListener('click', ()=>{
  clearTimeout(breathTimeout); breathRunning=false;
  document.getElementById('ghosts').style.opacity='0';
  document.getElementById('ghosts').innerHTML='';
  buildField(); show('s-field');
});

// ═══ STILL ═══
document.getElementById('gStill').addEventListener('click', enterStill);
document.getElementById('gStill').addEventListener('touchend', e=>{ e.preventDefault(); enterStill(); });
function enterStill() {
  clearInterval(stillT);
  let sec = 300;
  document.getElementById('stillTmr').textContent = '5:00';
  show('s-still');
  stillT = setInterval(()=>{
    sec--; const m=Math.floor(sec/60), s=sec%60;
    document.getElementById('stillTmr').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (sec<=0) clearInterval(stillT);
  },1000);
}
document.getElementById('stillBack').addEventListener('click', ()=>{ clearInterval(stillT); buildField(); show('s-field'); });

// ═══ WORDMARK HOLD ═══
const wm = document.getElementById('fwm');
wm.addEventListener('mousedown', ()=>{ wm.classList.add('holding'); holdT=setTimeout(()=>{ wm.classList.remove('holding'); if(navigator.vibrate)navigator.vibrate([28,18,28]); buildInit(); show('s-init'); },3000); });
wm.addEventListener('touchstart', e=>{ e.preventDefault(); wm.classList.add('holding'); holdT=setTimeout(()=>{ wm.classList.remove('holding'); if(navigator.vibrate)navigator.vibrate([28,18,28]); buildInit(); show('s-init'); },3000); },{passive:false});
['mouseup','touchend','mouseleave'].forEach(ev=>wm.addEventListener(ev,()=>{ clearTimeout(holdT); wm.classList.remove('holding'); }));

// ═══ ENTER FIELD ═══
function enterField() {
  tryDrone();
  localStorage.setItem('cu_v3','1');
  visited=true;
  buildField(); show('s-field');
}

// ═══ BREATH glyph (standalone from field) ═══
document.getElementById('gBreath').addEventListener('click', enterBreathStandalone);
document.getElementById('gBreath').addEventListener('touchend', e=>{ e.preventDefault(); enterBreathStandalone(); });
function enterBreathStandalone() {
  // pick a random state if none selected, then go to collapse with breath
  if (!curStateName) {
    const states = STATES[lang];
    const st = states[Math.floor(Math.random()*states.length)];
    selectState(st);
  } else {
    // go directly to breath stage of collapse
    const st = STATES[lang].find(s=>s.name===curStateName) || STATES[lang][0];
    selectState(st);
  }
}

// ═══ INIT ═══
setLang(lang);

if (visited) {
  document.addEventListener('click', tryDrone, {once:true});
  document.addEventListener('touchstart', tryDrone, {once:true});
  buildField(); show('s-field');
} else {
  buildInit(); show('s-init');
}
</script>
</body>
